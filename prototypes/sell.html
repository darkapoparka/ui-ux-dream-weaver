<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>treido — New Listing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display:['"Plus Jakarta Sans"','system-ui','sans-serif'], body:['Inter','system-ui','sans-serif'] },
          colors: { background:'hsl(0 0% 98%)', foreground:'hsl(0 0% 7%)', card:'hsl(0 0% 100%)', secondary:'hsl(0 0% 95%)', muted:'hsl(0 0% 45%)', accent:'hsl(0 0% 92%)', border:'hsl(0 0% 91%)', destructive:'hsl(0 72% 51%)', success:'hsl(152 55% 41%)' }
        }
      }
    }
  </script>
  <style>
    body { font-family:'Inter',system-ui,sans-serif; }
    h1,h2,h3,h4,h5,h6 { font-family:'Plus Jakarta Sans',system-ui,sans-serif; letter-spacing:-0.01em; }
    .scrollbar-hide { -ms-overflow-style:none; scrollbar-width:none; }
    .scrollbar-hide::-webkit-scrollbar { display:none; }
    .safe-bottom { padding-bottom:env(safe-area-inset-bottom,0px); }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }
  </style>
</head>
<body class="bg-background antialiased">
  <div class="min-h-screen pb-24 md:pb-8" id="formView">

    <!-- HEADER -->
    <header class="sticky top-0 z-40 bg-card/95 border-b border-border" style="backdrop-filter:blur(12px)">
      <div class="max-w-2xl mx-auto flex items-center justify-between h-12 px-4">
        <a href="home.html" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-secondary transition-colors -ml-1">
          <span class="iconify w-5 h-5 text-foreground" data-icon="lucide:arrow-left"></span>
        </a>
        <span class="text-[15px] font-semibold text-foreground font-display">New Listing</span>
        <div class="w-8"></div>
      </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 pt-4 space-y-5">
      <!-- Photos -->
      <div>
        <label class="text-[13px] font-semibold text-foreground mb-2.5 block">Photos <span class="text-muted font-normal" id="photoCount">(0/8)</span></label>
        <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-1" id="photoRow">
          <button onclick="addPhoto()" class="w-20 h-20 rounded-xl border-2 border-dashed border-border flex flex-col items-center justify-center gap-1 flex-shrink-0 hover:border-muted hover:bg-secondary/50 transition-all">
            <span class="iconify w-5 h-5 text-muted" data-icon="lucide:camera"></span>
            <span class="text-[10px] text-muted">Add</span>
          </button>
        </div>
      </div>

      <!-- Title -->
      <div>
        <label class="text-[13px] font-semibold text-foreground mb-1.5 block">Title</label>
        <input type="text" placeholder="e.g. iPhone 15 Pro Max 256GB" maxlength="120" class="w-full h-10 px-3 rounded-lg bg-secondary text-[13px] text-foreground placeholder:text-muted outline-none focus:ring-1 focus:ring-foreground transition-all" />
      </div>

      <!-- Description -->
      <div>
        <label class="text-[13px] font-semibold text-foreground mb-1.5 block">Description</label>
        <textarea placeholder="Describe your item — condition, features, reason for selling..." maxlength="2000" rows="4" class="w-full px-3 py-2.5 rounded-lg bg-secondary text-[13px] text-foreground placeholder:text-muted outline-none focus:ring-1 focus:ring-foreground transition-all resize-none leading-relaxed" oninput="document.getElementById('charCount').textContent=this.value.length+'/2000'"></textarea>
        <div class="flex justify-end mt-1"><span id="charCount" class="text-[11px] text-muted">0/2000</span></div>
      </div>

      <!-- Price -->
      <div>
        <label class="text-[13px] font-semibold text-foreground mb-1.5 block">Price</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[13px] text-muted">€</span>
          <input type="number" placeholder="0" min="0" max="999999" class="w-full h-10 pl-7 pr-3 rounded-lg bg-secondary text-[13px] text-foreground placeholder:text-muted outline-none focus:ring-1 focus:ring-foreground transition-all" />
        </div>
      </div>

      <!-- Category -->
      <div>
        <label class="text-[13px] font-semibold text-foreground mb-2 block">Category</label>
        <div class="flex flex-wrap gap-1.5" id="catPills">
          <button onclick="selectCat(this)" class="cat px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Electronics</button>
          <button onclick="selectCat(this)" class="cat px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Fashion</button>
          <button onclick="selectCat(this)" class="cat px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Home</button>
          <button onclick="selectCat(this)" class="cat px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Automotive</button>
          <button onclick="selectCat(this)" class="cat px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Gaming</button>
          <button onclick="selectCat(this)" class="cat px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Sports</button>
          <button onclick="selectCat(this)" class="cat px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Beauty</button>
          <button onclick="selectCat(this)" class="cat px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Kids</button>
        </div>
      </div>

      <!-- Condition -->
      <div>
        <label class="text-[13px] font-semibold text-foreground mb-2 block">Condition</label>
        <div class="flex gap-1.5" id="condPills">
          <button onclick="selectCond(this)" class="cond px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">New</button>
          <button onclick="selectCond(this)" class="cond px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Like New</button>
          <button onclick="selectCond(this)" class="cond px-3 py-1.5 rounded-full text-[12px] font-medium bg-secondary text-muted transition-all">Used</button>
        </div>
      </div>
    </main>

    <!-- STICKY BOTTOM -->
    <div class="fixed bottom-0 left-0 right-0 z-50 bg-card/95 border-t border-border safe-bottom" style="backdrop-filter:blur(12px)">
      <div class="max-w-2xl mx-auto px-4 py-3">
        <button onclick="submitListing()" class="w-full h-11 rounded-xl bg-foreground text-white text-[14px] font-semibold hover:opacity-90 transition-opacity">List Item</button>
      </div>
    </div>
  </div>

  <!-- SUCCESS STATE -->
  <div id="successView" class="hidden min-h-screen bg-background flex items-center justify-center px-4">
    <div class="text-center">
      <div class="w-14 h-14 rounded-full bg-success/10 flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
      </div>
      <p class="text-[15px] font-semibold text-foreground mb-1">Listed successfully</p>
      <p class="text-[13px] text-muted mb-5">Your item is now visible to buyers.</p>
      <a href="home.html" class="px-5 py-2 rounded-lg bg-foreground text-white text-[13px] font-medium hover:opacity-90 transition-opacity inline-block">Back to home</a>
    </div>
  </div>

  <script>
    const photos = [
      "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop",
      "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop",
      "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=400&fit=crop",
    ];
    let photoIdx = 0;

    function addPhoto() {
      if (photoIdx >= 8) return;
      const row = document.getElementById('photoRow');
      const div = document.createElement('div');
      div.className = 'relative w-20 h-20 rounded-xl overflow-hidden flex-shrink-0 bg-secondary';
      div.innerHTML = `<img src="${photos[photoIdx%photos.length]}" class="w-full h-full object-cover" /><button onclick="this.parentElement.remove();updatePhotoCount()" class="absolute top-1 right-1 w-5 h-5 rounded-full bg-foreground/70 flex items-center justify-center"><span class="iconify w-3 h-3 text-white" data-icon="lucide:x"></span></button>${photoIdx===0?'<span class="absolute bottom-1 left-1 text-[9px] font-medium text-white bg-foreground/60 px-1 py-0.5 rounded">Cover</span>':''}`;
      row.appendChild(div);
      photoIdx++;
      updatePhotoCount();
    }

    function updatePhotoCount() {
      const count = document.getElementById('photoRow').querySelectorAll('.bg-secondary').length;
      document.getElementById('photoCount').textContent = `(${count}/8)`;
    }

    function selectCat(el) {
      document.querySelectorAll('.cat').forEach(b => { b.classList.remove('bg-foreground','text-white'); b.classList.add('bg-secondary','text-muted'); });
      el.classList.remove('bg-secondary','text-muted'); el.classList.add('bg-foreground','text-white');
    }

    function selectCond(el) {
      document.querySelectorAll('.cond').forEach(b => { b.classList.remove('bg-foreground','text-white'); b.classList.add('bg-secondary','text-muted'); });
      el.classList.remove('bg-secondary','text-muted'); el.classList.add('bg-foreground','text-white');
    }

    function submitListing() {
      document.getElementById('formView').classList.add('hidden');
      document.getElementById('successView').classList.remove('hidden');
    }
  </script>
</body>
</html>
